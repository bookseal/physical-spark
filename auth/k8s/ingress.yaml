# Replaces the old `physical-revolt` Ingress (renamed to `physical-spark`): same-origin
# routing so the session cookie is first-party. /api/auth/* -> auth service; everything else -> static site.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: physical-spark
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
  - host: physical-spark.bit-habit.com
    http:
      paths:
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: pr-auth-svc
            port: { number: 8080 }
      - path: /api/scores
        pathType: Prefix
        backend:
          service:
            name: pr-auth-svc
            port: { number: 8080 }
      - path: /
        pathType: Prefix
        backend:
          service:
            name: physical-spark-svc
            port: { number: 80 }
  tls:
  - hosts: [ physical-spark.bit-habit.com ]
    secretName: tls-secret        # existing wildcard *.bit-habit.com cert
