apiVersion: apps/v1
kind: Deployment
metadata:
  name: pr-auth
  namespace: default
  labels: { app: pr-auth }
spec:
  replicas: 1
  strategy: { type: Recreate }        # single SQLite writer on a hostPath
  selector: { matchLabels: { app: pr-auth } }
  template:
    metadata: { labels: { app: pr-auth } }
    spec:
      containers:
      - name: pr-auth
        image: localhost:5000/pr-auth:latest
        imagePullPolicy: Always
        ports: [{ containerPort: 8080 }]
        env:
        - { name: PS_SITE, value: "https://physical-spark.bit-habit.com" }
        - { name: PS_AUTH_DB, value: "/data/auth.db" }
        - { name: PS_COOKIE_DOMAIN, value: ".bit-habit.com" }
        envFrom:
        - secretRef: { name: pr-auth-email, optional: true }   # SMTP_HOST/PORT/USER/PASS/FROM (reuse bithabit email)
        volumeMounts:
        - { name: data, mountPath: /data }
        readinessProbe:
          httpGet: { path: /api/auth/health, port: 8080 }
          initialDelaySeconds: 3
          periodSeconds: 10
      volumes:
      - name: data
        hostPath: { path: /home/ubuntu/workspace/pr-auth-data, type: DirectoryOrCreate }
