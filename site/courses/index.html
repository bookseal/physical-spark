<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Physical Spark — Missions</title>
<meta name="description" content="The Physical Spark curriculum: three robot-arm missions from 'Pat me on the back' to 'Red Light, Green Light'.">
<style>
  :root{
    --bg:#fbf5e9; --bg2:#f5ecd8; --fg:#2b211a; --muted:#948468; --line:#e8dcc4; --card:#fffdf9;
    --red:#e0442e; --gold:#e6a413; --blue:#2f6fd0; --teal:#0e9a89; --amber:#f4b21a;
    --accent:#e0442e; --shadow:rgba(120,80,20,.16);
  }
  /* single warm-light theme — no dark mode */
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--fg); line-height:1.65;
    font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans",sans-serif;}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;}
  a{color:var(--accent); text-decoration:none;}
  .wrap{max-width:900px; margin:0 auto; padding:0 22px;}
  nav{position:sticky; top:0; z-index:20; backdrop-filter:blur(8px); background:color-mix(in srgb,var(--bg) 84%,transparent); border-bottom:1px solid var(--line);}
  nav .wrap{display:flex; align-items:center; gap:16px; height:54px; max-width:900px;}
  nav .brand{font-weight:900; text-transform:uppercase; font-size:15px; letter-spacing:-.01em;}
  nav .brand b{color:var(--red);}
  nav .sp{margin-left:auto;}
  nav a.back{color:var(--muted); font-size:13px; font-weight:600;}
  .themebtn{background:var(--card); border:1px solid var(--line); color:var(--fg); border-radius:9px; padding:5px 9px; cursor:pointer;}

  /* hub */
  .hub-head{text-align:center; padding:46px 0 8px;}
  .hub-head h1{font-size:clamp(30px,6vw,52px); font-weight:900; margin:0 0 6px; text-transform:uppercase; letter-spacing:-.02em;}
  .hub-head h1 b{color:var(--red);}
  .hub-head p{color:var(--muted); max-width:560px; margin:6px auto 0;}
  .ring-wrap{display:flex; justify-content:center; margin:22px 0 6px;}
  .ring{--p:0; width:120px; height:120px; border-radius:50%; display:grid; place-items:center; position:relative;
    background:conic-gradient(var(--red) calc(var(--p)*1%), var(--line) 0);}
  .ring::before{content:""; position:absolute; inset:10px; border-radius:50%; background:var(--bg);}
  .ring b{position:relative; font-size:26px; font-weight:900;}
  .ring small{position:relative; display:block; text-align:center; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.12em;}

  .cards{display:grid; gap:16px; padding:26px 0 70px;}
  .mcard{display:block; background:var(--card); border:1px solid var(--line); border-left:6px solid var(--c);
    border-radius:16px; padding:20px 22px; box-shadow:0 8px 24px var(--shadow); transition:transform .1s ease, box-shadow .2s;}
  .mcard:hover{transform:translateY(-2px); box-shadow:0 14px 34px var(--shadow);}
  .mcard .top{display:flex; align-items:baseline; gap:12px;}
  .mcard .n{font-family:ui-monospace,monospace; font-size:34px; font-weight:900; color:var(--c); line-height:1;}
  .mcard h3{margin:0; font-size:21px; color:var(--fg);} .mcard .sub{color:var(--muted); font-size:14px; margin:4px 0 0;}
  .mcard .meta{font-family:ui-monospace,monospace; font-size:11px; color:var(--muted); margin:10px 0 8px;}
  .bar{height:8px; background:var(--line); border-radius:99px; overflow:hidden;}
  .bar > i{display:block; height:100%; width:0; background:var(--c); border-radius:99px; transition:width .5s cubic-bezier(.3,1.4,.5,1);}
  .mcard .pct{font-size:12px; color:var(--muted); margin-top:6px;}

  /* mission view */
  .mhero{padding:40px 0 26px; border-bottom:1px solid var(--line);}
  .mhero .n{font-family:ui-monospace,monospace; font-size:16px; font-weight:900; color:var(--c);}
  .mhero h1{margin:6px 0 6px; font-size:clamp(28px,5.5vw,44px); font-weight:900; letter-spacing:-.02em;}
  .mhero .sub{color:var(--muted); font-size:17px; max-width:620px;}
  .tags{display:flex; gap:8px; flex-wrap:wrap; margin-top:16px;}
  .tag{font-family:ui-monospace,monospace; font-size:11px; font-weight:700; color:var(--c); border:1px solid var(--line); background:var(--card); border-radius:7px; padding:3px 9px;}
  .build{background:var(--bg2); border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin:24px 0;}
  .build b{color:var(--c);}

  .lesson{border:1px solid var(--line); border-radius:14px; margin:12px 0; background:var(--card); overflow:hidden;}
  .lhead{display:flex; align-items:center; gap:12px; padding:15px 18px; cursor:pointer; user-select:none;}
  .lhead .ln{width:30px; height:30px; flex:0 0 30px; border-radius:50%; display:grid; place-items:center; font-weight:800; font-size:13px;
    background:var(--bg2); color:var(--c); border:1px solid var(--line);}
  .lesson.done .lhead .ln{background:var(--c); color:#fff; border-color:var(--c);}
  .lhead h4{margin:0; font-size:16px; flex:1;}
  .lhead .chev{color:var(--muted); transition:transform .2s;}
  .lesson.open .lhead .chev{transform:rotate(90deg);}
  .lbody{display:none; padding:2px 18px 18px 60px;}
  .lesson.open .lbody{display:block;}
  .lbody p{margin:8px 0; color:var(--fg);} .lbody .k{color:var(--muted); font-size:13px;}
  pre{background:var(--bg2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; overflow-x:auto; position:relative;}
  pre code{font-family:ui-monospace,monospace; font-size:12.5px; line-height:1.6;}
  .copy{position:absolute; top:8px; right:8px; font-size:11px; border:1px solid var(--line); background:var(--card); color:var(--muted); border-radius:6px; padding:2px 8px; cursor:pointer;}
  .check{display:inline-flex; align-items:center; gap:8px; margin-top:12px; font-weight:700; font-size:14px; cursor:pointer; color:var(--c);}
  .check .box{width:22px; height:22px; border:2px solid var(--c); border-radius:7px; display:grid; place-items:center; color:transparent;}
  .lesson.done .check .box{background:var(--c); color:#fff;}
  .note{border-left:3px solid var(--amber); background:color-mix(in srgb,var(--amber) 12%,transparent); padding:8px 14px; border-radius:0 8px 8px 0; font-size:13.5px; margin:12px 0;}

  .mnav{display:flex; justify-content:space-between; gap:12px; margin:30px 0 70px;}
  .mnav a{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 16px; font-weight:700; font-size:14px;}
  .mnav a:hover{border-color:var(--red);}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(80px); background:var(--red); color:#fff;
    padding:12px 20px; border-radius:12px; font-weight:800; box-shadow:0 12px 30px var(--shadow); transition:transform .3s cubic-bezier(.3,1.5,.5,1); z-index:40;}
  .toast.show{transform:translateX(-50%) translateY(0);}
  footer{border-top:1px solid var(--line); padding:26px 0; text-align:center; color:var(--muted); font-size:13px;}
</style>
</head>
<body>
<nav><div class="wrap">
  <span class="brand">Physical<b> Revolt</b></span>
  <span class="sp"></span>
  <span id="pr-auth-slot" style="margin-right:16px;font-size:13px;font-weight:600"></span>
  <a class="back" href="../index.html#missions">← landing</a>
</div></nav>
<div id="app"></div>
<div class="toast" id="toast"></div>
<footer><div class="wrap mono">PHYSICAL SPARK · curriculum v0 · building in public</div></footer>

<script>

/* ---------------- curriculum data (v0 — living draft) ---------------- */
const COURSES = [
  { id:'m0', num:0, color:'var(--teal)', title:'Setup & First Simulation', sub:'From an empty Mac to a running robot simulation — your first win, no GPU needed.',
    level:'Beginner', time:'~1 hour', device:'Mac (CPU/MPS · no GPU)',
    build:'A working <b>Hugging Face LeRobot</b> dev environment on your MacBook, and your <b>first simulation</b> rendered to a video you can watch. This is the foundation the whole course stands on — do it once, reuse it everywhere.',
    lessons:[
      {t:'What you\'ll do (and the Mac reality)', c:'By the end you\'ll have installed <a href="https://github.com/huggingface/lerobot" target="_blank">LeRobot</a>, opened a real <b>MuJoCo</b> physics sim, and saved a video of it. All on a Mac, on CPU — <b>no NVIDIA GPU required</b>.',
        note:'Honest scope: the SO-101 arm *in simulation* needs NVIDIA Isaac (Linux + RTX). On a Mac you learn the exact same toolchain with LeRobot\'s MuJoCo gyms (here: <b>PushT</b>). Everything you learn transfers; only the heavy GPU training moves to the cloud later.',
        chk:'You understand: install LeRobot → run a MuJoCo sim → watch it. Mac + CPU is enough for this.'},
      {t:'Create a Python environment', c:'We isolate everything in a fresh env so nothing on your Mac breaks. Using <a href="https://conda-forge.org/download/" target="_blank">miniforge</a>/conda (recommended by LeRobot). Python <b>3.12</b>.',
        code:'conda create -y -n lerobot python=3.12\nconda activate lerobot',
        note:'No conda yet? Install miniforge first: `brew install miniforge` (or the installer from conda-forge). You must run `conda activate lerobot` in every new terminal.',
        chk:'`conda activate lerobot` works and `python --version` prints 3.12.x.'},
      {t:'Install LeRobot + a simulation', c:'Clone LeRobot and install it in editable mode with the <b>pusht</b> simulation extra (that pulls in the <code>gym_pusht</code> MuJoCo environment). First install takes a few minutes.',
        code:'git clone https://github.com/huggingface/lerobot.git\ncd lerobot\npip install -e ".[pusht]"',
        note:'macOS installs the default MPS/CPU PyTorch wheel automatically — no CUDA. On many Macs TorchCodec falls back to `pyav`, so you do NOT need ffmpeg. If you later hit a video-decode error, run `conda install ffmpeg -c conda-forge`.',
        chk:'`pip install` finished without errors (you\'re inside the `lerobot` folder).'},
      {t:'Verify it worked', c:'Quick sanity check that LeRobot and the PushT sim env are importable and registered with Gymnasium.',
        code:'python -c "import lerobot, gym_pusht, gymnasium as gym; print(\'LeRobot OK ·\', len(gym.envs.registry), \'envs registered\')"',
        chk:'It prints "LeRobot OK · <number> envs registered" with no traceback.'},
      {t:'Run your FIRST simulation 🎉', c:'Save this as <code>first_sim.py</code> inside the <code>lerobot</code> folder and run <code>python first_sim.py</code>. It steps the <b>PushT</b> physics sim with random actions and writes <b>rollout.mp4</b> — open it and watch your first simulation move.',
        code:'import gymnasium as gym, gym_pusht, cv2\nenv = gym.make("gym_pusht/PushT-v0", render_mode="rgb_array")\nobs, _ = env.reset(seed=0)\nframes = []\nfor _ in range(200):\n    action = env.action_space.sample()      # random policy — your first sim\n    obs, reward, term, trunc, info = env.step(action)\n    frames.append(env.render())\n    if term or trunc: obs, _ = env.reset()\nenv.close()\nh, w, _ = frames[0].shape\nvw = cv2.VideoWriter("rollout.mp4", cv2.VideoWriter_fourcc(*"mp4v"), 30, (w, h))\nfor f in frames: vw.write(cv2.cvtColor(f, cv2.COLOR_RGB2BGR))\nvw.release()\nprint("saved rollout.mp4 —", len(frames), "frames")',
        note:'Random actions on purpose: the point is that the *simulation runs*. Next you\'ll make it smart. (`cv2` ships with LeRobot\'s core deps, so no extra install.)',
        chk:'rollout.mp4 was created and shows the PushT sim moving.'},
      {t:'What you just saw + next', c:'Three words unlock everything that follows: <b>environment</b> (the simulated world), <b>policy</b> (the brain choosing actions — yours was random), and <b>dataset</b> (recorded experience a policy learns from). Level up next: watch a <b>trained</b> policy solve this same task — LeRobot ships a pretrained one (<code>lerobot/diffusion_pusht</code>) — see the <a href="https://huggingface.co/docs/lerobot" target="_blank">LeRobot docs</a>. Then you\'re ready for <b>Mission 1 — Pat me</b>.',
        note:'When you can watch AI push the T-block into place, you\'ve done real Physical AI on a laptop. From here, recording your own sim data (gym-hil) and Mission 1 are the next steps.',
        chk:'You can say in one line each what an environment, a policy, and a dataset are.'},
    ]},
  { id:'m1', num:1, color:'var(--red)', title:'Pat me on the back', sub:'Build the arm and make it gently pat your back — a warm first win.',
    level:'Beginner', time:'~1 hour', device:'Mac-friendly (sim)',
    build:'A robot arm that sweeps left↔right to pat your back — recorded as a short clip you can post. The point isn\'t skill, it\'s <b>attachment</b>: the robot you built comforts you.',
    lessons:[
      {t:'Set up your dev world', c:'Install the LeRobot toolchain on your Mac (Apple Silicon works). This is the same stack the whole course uses. See <a href="../../lab/tutorials/00_sim-setup-before-pat-me.md">the sim-setup tutorial</a> for the full path.',
        code:'conda create -y -n lerobot python=3.12\nconda activate lerobot\ngit clone https://github.com/huggingface/lerobot.git && cd lerobot\npip install -e ".[pusht,aloha]"',
        chk:'`conda activate lerobot` works and `python -c "import lerobot"` runs with no error.'},
      {t:'Meet the arm (in simulation)', c:'A robot arm has <b>joints (DOF)</b>, links, and an <b>end-effector</b> (the gripper). The SO-101 is 6-DOF. You don\'t need the real arm yet — run a LeRobot sim env to watch a policy move an arm and get a feel for joint control.',
        note:'Honest v0: the SO-101 itself only simulates on Linux+GPU (Isaac). On Mac we learn the *motion concept* with LeRobot\'s MuJoCo gym (Panda/pusht). The real SO-101 sweep lands with hardware or a cloud GPU — see the hardware guide.',
        chk:'You ran a sim env and watched an arm move on screen.'},
      {t:'The "pat" motion', c:'A pat is just a <b>left↔right sweep</b> of one joint, repeated. Conceptually: pick a base joint, oscillate its target angle over time (a sine wave), send targets on a loop. Slow and gentle > fast.',
        code:'# pseudo-code for the motion idea\nimport time, math\nwhile True:\n    t = time.time()\n    angle = 0.4 * math.sin(t * 1.5)   # gentle left-right\n    arm.set_joint_target("base", angle) # send to sim (or real) arm\n    time.sleep(0.02)',
        chk:'You can describe (or code) a left-right sweep as an oscillating joint target.'},
      {t:'Record your run', c:'Capture a short clip of the sweep — screen recording of the sim is fine for v0. This clip is what you post for peer review. Rough is good; it\'s a playground.',
        chk:'You have a short clip of your pat motion.'},
      {t:'Post & peer-review', c:'Upload your clip, then <b>review one other person\'s run</b>. What made theirs gentle/convincing? This loop — not the code — is the product.',
        chk:'You posted your clip and reviewed one peer.'},
    ]},
  { id:'m2', num:2, color:'var(--blue)', title:'Pick & place', sub:'Grab an object and move it — the "Hello World" of manipulation.',
    level:'Beginner', time:'~2 hours', device:'sim or real',
    build:'A run where the arm <b>picks up an object and places it</b> somewhere else. You\'ll also record it as a small <b>dataset</b> — the raw material machines learn from.',
    lessons:[
      {t:'Teleoperation — you are the teacher', c:'<b>Teleop</b> = you move a leader arm (or keyboard in sim) and the follower copies you. Every teleop run becomes training data. This is how learning-based robots get taught: by demonstration, not by rules.',
        chk:'You understand teleop = demonstrating, which becomes a dataset.'},
      {t:'The grasp', c:'A pick is three beats: <b>approach</b> (move above the object) → <b>descend & close</b> the gripper → <b>lift</b>. Inverse kinematics (IK) turns "put the gripper here" into joint angles — the sim/LeRobot handles the math.',
        chk:'You can name the three beats of a grasp.'},
      {t:'The place', c:'Placing mirrors picking: <b>move</b> to the target → <b>lower</b> → <b>open</b> the gripper → retreat. Congrats — that\'s pick & place, the atom of manipulation.',
        chk:'You completed a pick→place in sim (or described it precisely).'},
      {t:'Record a dataset', c:'Use LeRobot to record your teleop episodes (video + joint states + actions). A handful of clean episodes is the seed of a policy.',
        code:'# LeRobot records episodes to a dataset you can replay/train on\n# (exact CLI evolves — check the LeRobot docs for lerobot-record)\nlerobot-record --help',
        note:'Exact commands shift between LeRobot versions — always cross-check the current docs. Concept is stable: teleop → episodes → dataset.',
        chk:'You recorded (or replayed) at least one episode.'},
      {t:'Peek: imitation learning', c:'With a dataset, a small policy can <b>learn to imitate</b> your demos (behavioral cloning). You don\'t have to train one yet — just know this is the bridge from "I did it" to "the robot does it". More in the foundations map.',
        chk:'You know a dataset can train a policy to imitate you.'},
    ]},
  { id:'m3', num:3, color:'var(--gold)', title:'Red Light, Green Light', sub:'The robot moves while you speak, and freezes the instant you stop. The one Squid Game made famous.',
    level:'Intermediate', time:'~4 hours', device:'peer-review shines here',
    build:'The ace demo: say the phrase, the arm moves; stop talking, it <b>freezes</b>. There\'s no single right answer — which is exactly why peer review matters most here.',
    lessons:[
      {t:'Why this is an open problem', c:'"Move while speaking, stop on silence" hides hard sub-problems: speech recognition, <b>end-of-speech detection</b>, latency, noise, multiple languages, fake-outs. No textbook answer → your approach is genuinely yours, and reviewers learn from the differences.',
        chk:'You can list 2–3 sub-problems hidden in this mission.'},
      {t:'Speech input — "am I speaking?"', c:'Start simple: you don\'t need perfect transcription, you need <b>is-someone-talking</b>. A mic + a voice-activity check (energy threshold, or a small VAD model) gives you a live "speaking / not speaking" signal.',
        code:'# the signal you actually need:  speaking? -> True/False, live\n# v0: microphone amplitude over a threshold\n# v1: a proper VAD (voice activity detection) model for robustness',
        chk:'You have a live boolean: is the user speaking?'},
      {t:'End-of-speech detection (the hard part)', c:'The game is won or lost on <b>how fast you detect the stop</b>. Too eager → freezes mid-word. Too slow → keeps moving after silence. This latency trade-off is the real engineering — and the most fun thing to peer-review.',
        note:'This is the crux. Two people will solve it differently (silence timeout vs. model-based) — that contrast is the whole point of the mission.',
        chk:'You can explain the latency trade-off in end-of-speech detection.'},
      {t:'Gate the motion', c:'Now wire it: <b>while speaking → run the arm motion; on stop → freeze</b>. The motion can be anything (reuse your sweep from Mission 1). The magic is the gating on the speech signal.',
        code:'while True:\n    if speaking():          # your live signal\n        arm.step_motion()   # e.g. the sweep from Mission 1\n    else:\n        arm.hold()          # freeze in place',
        chk:'Your arm moves on speech and freezes on silence (sim or real).'},
      {t:'Make it yours (variations)', c:'Open the creative space: background-noise robustness, Korean ↔ English, speed changes, fake-out words, funny freeze poses. Each variation is a different demo — and a different thing to review.',
        chk:'You added at least one variation of your own.'},
      {t:'Record & peer-review (this is the finale)', c:'Post your run. Then review others deeply — how did they handle the stop? Whose freeze felt sharpest? The gallery of these is the demo that sells the whole idea.',
        chk:'You posted your Red Light, Green Light run and reviewed peers.'},
    ]},
];

/* ---------------- progress (localStorage) ---------------- */
const KEY='pr-progress';
let prog={}; try{prog=JSON.parse(localStorage.getItem(KEY)||'{}')}catch(e){}
function saveP(){try{localStorage.setItem(KEY,JSON.stringify(prog))}catch(e){}}
function isDone(mid,i){return !!(prog[mid]&&prog[mid][i]);}
function setDone(mid,i,v){ (prog[mid]=prog[mid]||{})[i]=v; saveP(); }
function mPct(m){ const n=m.lessons.length; let d=0; for(let i=0;i<n;i++) if(isDone(m.id,i)) d++; return Math.round(d/n*100); }
function overallPct(){ let t=0,d=0; for(const m of COURSES){ t+=m.lessons.length; for(let i=0;i<m.lessons.length;i++) if(isDone(m.id,i)) d++; } return t?Math.round(d/t*100):0; }

/* ---------------- render ---------------- */
const app=document.getElementById('app');
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

function renderHub(){
  const op=overallPct();
  let cards=COURSES.map(m=>`
    <a class="mcard" style="--c:${m.color}" href="#/${m.id}">
      <div class="top"><span class="n">${m.num}</span><div><h3>${m.title}</h3><div class="sub">${m.sub}</div></div></div>
      <div class="meta">${m.level} · ${m.time} · ${m.device}</div>
      <div class="bar"><i style="width:${mPct(m)}%"></i></div>
      <div class="pct">${mPct(m)}% complete</div>
    </a>`).join('');
  app.innerHTML=`
    <div class="wrap">
      <div class="hub-head">
        <h1>The <b>Missions</b></h1>
        <p>Three robot-arm challenges, sim-first. Work through them, post your runs, review each other. This is a
           living <b>v0 curriculum</b> — built in public, rough on purpose.</p>
        <div class="ring-wrap"><div class="ring" style="--p:${op}"><div><b>${op}%</b><small>your revolt</small></div></div></div>
      </div>
      <div class="cards">${cards}</div>
    </div>`;
  requestAnimationFrame(()=>document.querySelectorAll('.bar > i').forEach(i=>i.style.width=i.style.width));
}

function renderMission(m){
  const idx=COURSES.indexOf(m), prev=COURSES[idx-1], next=COURSES[idx+1];
  const lessons=m.lessons.map((l,i)=>`
    <div class="lesson${isDone(m.id,i)?' done':''}" data-i="${i}">
      <div class="lhead"><span class="ln">${i+1}</span><h4>${l.t}</h4><span class="chev">▸</span></div>
      <div class="lbody">
        <p>${l.c}</p>
        ${l.code?`<pre><button class="copy">copy</button><code>${esc(l.code)}</code></pre>`:''}
        ${l.note?`<div class="note">⚠️ ${l.note}</div>`:''}
        <div class="check"><span class="box">✓</span><span>Checkpoint: ${l.chk}</span></div>
      </div>
    </div>`).join('');
  app.innerHTML=`
    <div class="wrap">
      <div class="mhero" style="--c:${m.color}">
        <div class="n mono">MISSION ${m.num}</div>
        <h1>${m.title}</h1>
        <div class="sub">${m.sub}</div>
        <div class="tags"><span class="tag">${m.level}</span><span class="tag">${m.time}</span><span class="tag">${m.device}</span></div>
      </div>
      <div class="build" style="--c:${m.color}"><b>What you'll build:</b> ${m.build}</div>
      ${lessons}
      <div class="mnav">
        <a href="#/">← all missions</a>
        ${next?`<a href="#/${next.id}">next: ${next.title} →</a>`:`<a href="../index.html#play">done — take a lap ▶</a>`}
      </div>
    </div>`;
  // wire lessons
  document.querySelectorAll('.lesson').forEach(el=>{
    const i=+el.dataset.i;
    el.querySelector('.lhead').onclick=()=>el.classList.toggle('open');
    el.querySelector('.check').onclick=(e)=>{
      e.stopPropagation(); const now=!isDone(m.id,i); setDone(m.id,i,now); el.classList.toggle('done',now);
      if(now && mPct(m)===100) toast('🏁 Mission '+m.num+' complete!'); else if(now) toast('✓ checkpoint');
    };
    el.querySelector('.copy')&&(el.querySelector('.copy').onclick=(e)=>{e.stopPropagation();
      navigator.clipboard.writeText(el.querySelector('code').textContent); e.target.textContent='copied'; setTimeout(()=>e.target.textContent='copy',1200);});
  });
  // open first not-done lesson
  const firstOpen=[...document.querySelectorAll('.lesson')].find(el=>!el.classList.contains('done'))||document.querySelector('.lesson');
  firstOpen&&firstOpen.classList.add('open');
}

function route(){
  const h=location.hash.replace(/^#\//,'');
  const m=COURSES.find(c=>c.id===h);
  if(m) renderMission(m); else renderHub();
  scrollTo(0,0);
}
addEventListener('hashchange',route); route();
</script>
<script src="../auth.js"></script>
</body>
</html>
